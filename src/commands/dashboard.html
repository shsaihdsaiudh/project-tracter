<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: #ffffff;
      border-right: 1px solid #e8e8ed;
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: sticky;
      top: 0;
    }
    .sidebar-header {
      padding: 1.25rem 1rem 0.75rem;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #aeaeb2;
    }
    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 0.5rem;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 0.6rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      font-size: 0.85rem;
    }
    .sidebar-item:hover { background: #f5f5f7; }
    .sidebar-item.active { background: #e8f5e9; }
    .sidebar-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .sidebar-dot.on  { background: #34c759; }
    .sidebar-dot.off { background: #d1d1d6; }
    .sidebar-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sidebar-remove {
      width: 20px;
      height: 20px;
      border: none;
      background: transparent;
      color: #aeaeb2;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }
    .sidebar-item:hover .sidebar-remove { opacity: 1; }
    .sidebar-remove:hover { color: #ff3b30; background: #fff0f0; }

    .sidebar-footer {
      padding: 0.75rem 0.5rem;
      border-top: 1px solid #e8e8ed;
    }
    .sidebar-add-btn {
      width: 100%;
      padding: 0.55rem;
      border: 1.5px dashed #d1d1d6;
      background: transparent;
      border-radius: 8px;
      color: #86868b;
      font-size: 0.82rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
    }
    .sidebar-add-btn:hover {
      border-color: #34c759;
      color: #34c759;
      background: #f0faf2;
    }
    .sidebar-add-btn.loading { pointer-events: none; opacity: 0.6; }
    .sidebar-empty {
      padding: 2rem 1rem;
      text-align: center;
      color: #aeaeb2;
      font-size: 0.8rem;
      line-height: 1.6;
    }

    /* ── Main ── */
    .main {
      flex: 1;
      padding: 2rem 2rem 2rem 2.5rem;
      min-width: 0;
      max-width: 900px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: #86868b;
    }
    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #34c759;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Project section ── */
    .project-section {
      margin-bottom: 2rem;
    }
    .project-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 0;
      margin-bottom: 0.5rem;
      border-bottom: 1.5px solid #e8e8ed;
    }
    .project-bar .name {
      font-weight: 700;
      font-size: 1.05rem;
    }
    .project-bar .meta {
      font-size: 0.75rem;
      color: #aeaeb2;
    }
    .project-bar .meta span {
      margin-left: 0.6rem;
    }
    .project-bar .badge {
      font-size: 0.65rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge.active {
      background: #e8f5e9;
      color: #34c759;
    }
    .badge.inactive {
      background: #f5f5f7;
      color: #aeaeb2;
    }

    /* ── Session row ── */
    .session-row {
      background: #ffffff;
      border-radius: 10px;
      padding: 0.9rem 1.1rem;
      margin-bottom: 0.4rem;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      border-left: 3px solid #e5e5e7;
      transition: box-shadow 0.15s;
    }
    .session-row:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .session-row.recent  { border-left-color: #34c759; }
    .session-row.today   { border-left-color: #f59e0b; }
    .session-row.older   { border-left-color: #aeaeb2; }

    .session-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.35rem;
    }
    .session-time {
      font-size: 0.72rem;
      color: #aeaeb2;
      white-space: nowrap;
    }
    .session-time.live { color: #34c759; font-weight: 600; }
    .session-topic {
      font-size: 0.83rem;
      color: #515154;
      font-weight: 600;
    }
    .session-message {
      font-size: 0.8rem;
      color: #6e6e73;
      line-height: 1.5;
      white-space: pre-line;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 6;
      -webkit-box-orient: vertical;
      font-style: italic;
      padding-left: 0.2rem;
      border-left: 2px solid #f0f0f2;
    }
    .session-empty {
      font-size: 0.8rem;
      color: #aeaeb2;
      padding: 1rem 1.1rem;
      background: #fafafa;
      border-radius: 10px;
      border: 1px dashed #e8e8ed;
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 4rem 1rem;
      color: #86868b;
      display: none;
    }
    .empty.show { display: block; }
    .empty .emoji { font-size: 3rem; margin-bottom: 1rem; }
    .empty h2 { font-size: 1.1rem; margin-bottom: 0.5rem; color: #515154; }
    .empty p { font-size: 0.85rem; line-height: 1.6; }
    .empty code {
      background: #e8e8ed;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.82rem;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      font-size: 0.7rem;
      color: #aeaeb2;
      margin-top: 2rem;
      padding-bottom: 2rem;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      body { flex-direction: column; }
      .sidebar {
        width: 100%;
        min-width: 0;
        height: auto;
        position: static;
        border-right: none;
        border-bottom: 1px solid #e8e8ed;
        max-height: 40vh;
      }
      .main { padding: 1rem; max-width: none; }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">📋 追踪项目</div>
    <div class="sidebar-list" id="sidebarList"></div>
    <div class="sidebar-footer">
      <button class="sidebar-add-btn" id="addBtn" title="添加项目">
        <span>+</span> 添加项目
      </button>
    </div>
  </aside>

  <div class="main">
    <div class="header">
      <h1>🏠 Project Tracker</h1>
      <div class="live-badge">
        <span class="live-dot"></span>
        实时监控中
      </div>
    </div>

    <div id="content"></div>

    <div class="empty" id="empty">
      <div class="emoji">📋</div>
      <h2>当前没有活跃项目</h2>
      <p>
        点击左侧「+ 添加项目」追踪项目<br>
        和 Claude Code 对话后，会话会自动显示在这里
      </p>
    </div>

    <div class="footer" id="footer">正在连接...</div>
  </div>

  <script>
    var __INITIAL__ = __INITIAL_JSON__;

    // ── Utils ──────────────────────────────────────────

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function getTimeClass(iso) {
      var diffMs = Date.now() - new Date(iso).getTime();
      if (diffMs < 3600000) return 'recent';
      if (diffMs < 86400000) return 'today';
      return 'older';
    }

    function getTimeLiveClass(iso) {
      return (Date.now() - new Date(iso).getTime()) < 600000 ? ' live' : '';
    }

    function updateFooter() {
      var now = new Date();
      document.getElementById('footer').textContent =
        '最后更新 ' + now.toLocaleTimeString('zh-CN', { hour12: false });
    }

    // ── Sidebar ────────────────────────────────────────

    function renderSidebar(projects) {
      var listEl = document.getElementById('sidebarList');
      if (!projects || projects.length === 0) {
        listEl.innerHTML = '<div class="sidebar-empty">暂无追踪项目<br>点击下方按钮添加</div>';
        return;
      }
      var html = '';
      for (var i = 0; i < projects.length; i++) {
        var p = projects[i];
        var dotCls = p.isActive ? 'on' : 'off';
        html +=
          '<div class="sidebar-item' + (p.isActive ? ' active' : '') + '" data-name="' + esc(p.name) + '">' +
            '<span class="sidebar-dot ' + dotCls + '"></span>' +
            '<span class="sidebar-name" title="' + esc(p.path) + '">📁 ' + esc(p.name) + '</span>' +
            '<button class="sidebar-remove" data-name="' + esc(p.name) + '" title="移除追踪">&times;</button>' +
          '</div>';
      }
      listEl.innerHTML = html;
    }

    function bindSidebarEvents() {
      var btns = document.querySelectorAll('.sidebar-remove');
      for (var i = 0; i < btns.length; i++) {
        btns[i].addEventListener('click', function(e) {
          e.stopPropagation();
          var name = this.getAttribute('data-name');
          if (confirm('确定要移除对 「' + name + '」 的追踪吗？')) {
            removeProject(name);
          }
        });
      }
    }

    function removeProject(name) {
      fetch('/api/projects/' + encodeURIComponent(name), { method: 'DELETE' })
        .then(function() { /* SSE will push update */ })
        .catch(function() {});
    }

    function addProject() {
      var btn = document.getElementById('addBtn');
      btn.classList.add('loading');
      btn.textContent = '... 选择中';

      fetch('/api/browse', { method: 'POST' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.path) {
            return fetch('/api/projects', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ path: data.path })
            });
          }
          return null;
        })
        .catch(function() {})
        .finally(function() {
          btn.classList.remove('loading');
          btn.innerHTML = '<span>+</span> 添加项目';
        });
    }

    document.getElementById('addBtn').addEventListener('click', addProject);

    // ── Content (list layout) ──────────────────────────

    function renderContent(sections) {
      var contentEl = document.getElementById('content');
      var emptyEl = document.getElementById('empty');

      if (!sections || sections.length === 0) {
        contentEl.innerHTML = '';
        emptyEl.classList.add('show');
      } else {
        emptyEl.classList.remove('show');
        var html = '';
        for (var i = 0; i < sections.length; i++) {
          var sec = sections[i];
          var badgeCls = sec.isActive ? 'active' : 'inactive';
          var badgeText = sec.isActive ? '活跃' : '休眠';
          var branch = sec.sessions.length > 0 ? sec.sessions[0].branch : '-';

          html += '<div class="project-section">';
          html +=
            '<div class="project-bar">' +
              '<span>📁</span>' +
              '<span class="name">' + esc(sec.name) + '</span>' +
              '<span class="badge ' + badgeCls + '">' + badgeText + '</span>' +
              '<span class="meta">' +
                '<span>🌿 ' + esc(branch) + '</span>' +
                '<span>💬 ' + sec.sessionCount + ' 个会话</span>' +
              '</span>' +
            '</div>';

          if (sec.sessions.length === 0) {
            html += '<div class="session-empty">尚无 Claude Code 对话记录，在此项目中启动 Claude Code 后会自动出现</div>';
          }

          for (var j = 0; j < sec.sessions.length; j++) {
            var s = sec.sessions[j];
            var cls = getTimeClass(s.lastActiveAt);
            var liveCls = getTimeLiveClass(s.lastActiveAt);
            html +=
              '<div class="session-row ' + cls + '">' +
                '<div class="session-top">' +
                  '<span class="session-topic">' + esc(s.title) + '</span>' +
                  '<span class="session-time' + liveCls + '">' + esc(s.relativeTime) + '</span>' +
                '</div>' +
                '<div class="session-message">── "' + esc(s.lastMessage) + '"</div>' +
              '</div>';
          }

          html += '</div>';
        }
        contentEl.innerHTML = html;
      }
      updateFooter();
    }

    // ── SSE (Server-Sent Events) ───────────────────────

    function connectSSE() {
      var es = new EventSource('/api/events');

      es.onmessage = function(event) {
        var data = JSON.parse(event.data);
        renderSidebar(data.projects);
        bindSidebarEvents();
        renderContent(data.sections);
      };

      es.onerror = function() {
        // Reconnect automatically after a delay
        es.close();
        setTimeout(connectSSE, 3000);
      };

      return es;
    }

    // ── Init ───────────────────────────────────────────

    renderSidebar(__INITIAL__.projects);
    bindSidebarEvents();
    renderContent(__INITIAL__.sections);
    connectSSE();
  </script>
</body>
</html>
